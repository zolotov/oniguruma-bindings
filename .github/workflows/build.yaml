name: "Build"
permissions: {}

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_call:

env:
  RUST_VERSION: 1.84.1

jobs:
  build-native-linux:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
      options: --user root

    steps:
      - name: Checkout sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install compilation dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            build-essential \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Setup Rust for x86_64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: x86_64-unknown-linux-gnu
          cache: true
          cache-key: x86
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Rust for aarch64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: aarch64-unknown-linux-gnu
          cache: true
          cache-key: aarch64
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build with Gradle
        run: ./gradlew :oniguruma-jni:compileNative-aarch64-unknown-linux-gnu :oniguruma-jni:compileNative-x86_64-unknown-linux-gnu
        env:
          NATIVE_BUILD_MODE: "all"

      - name: Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-native-artifacts
          path: oniguruma-jni/build/target

  build-native-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Rust for x86_64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: x86_64-pc-windows-msvc
          cache: true
          cache-key: x86
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Rust for aarch64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: aarch64-pc-windows-msvc
          cache: true
          cache-key: aarch64
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build with Gradle
        env:
          NATIVE_BUILD_MODE: "all"
        run: ./gradlew :oniguruma-jni:compileNative-x86_64-pc-windows-msvc :oniguruma-jni:compileNative-aarch64-pc-windows-msvc

      - name: Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-native-artifacts
          path: oniguruma-jni/build/target

  build-native-mac:
    runs-on: macos-14

    steps:
      - name: Checkout sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Rust for x86_64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: x86_64-apple-darwin
          cache: true
          cache-key: x86
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Rust for aarch64
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: aarch64-apple-darwin
          cache: true
          cache-key: aarch64
          cache-workspaces: "./oniguruma-jni/native -> target"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build with Gradle
        run: ./gradlew :oniguruma-jni:compileNative-x86_64-apple-darwin :oniguruma-jni:compileNative-aarch64-apple-darwin
        env:
          NATIVE_BUILD_MODE: "all"

      - name: Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-native-artifacts
          path: oniguruma-jni/build/target

  build:
    runs-on: ubuntu-22.04
    needs: [build-native-linux, build-native-windows, build-native-mac]
    steps:
      - name: Checkout sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: oniguruma-jni/build/target
          merge-multiple: true

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build with Gradle
        run: ./gradlew :oniguruma-jni:build
        env:
          NATIVE_BUILD_MODE: "skip"
